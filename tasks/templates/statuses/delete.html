{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
  <h1 class="display-5 mb-4">{% block title %}Удаление статуса{% endblock %}</h1>

  <div class="alert alert-warning">
    Вы уверены, что хотите удалить статус "{{ object.name }}"?
  </div>

  <form method="post">
    {% csrf_token %}
    <button class="btn btn-danger">Да, удалить</button>
    <a href="{% url 'tasks:status_list' %}" class="btn btn-secondary">Отмена</a>
  </form>
</div>
{% endblock %}
