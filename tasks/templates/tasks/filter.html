{% load widget_tweaks %}

<div class="card mb-4">
  <div class="card-body">

    <form method="get">
      <div class="mb-3">
        <label class="form-label">Статус</label>
        {{ filter.form.status|add_class:"form-select" }}
      </div>

      <div class="mb-3">
        <label class="form-label">Исполнитель</label>
        {{ filter.form.executor|add_class:"form-select" }}
      </div>

      <div class="mb-3">
        <label class="form-label">Метка</label>
        {{ filter.form.labels|add_class:"form-select" }}
      </div>

      <div class="form-check mb-3">
        <input type="checkbox" name="{{ filter.form.self_tasks.name }}" id="{{ filter.form.self_tasks.id_for_label }}"
          class="form-check-input" {% if filter.form.self_tasks.value %}checked{% endif %}>
        <label class="form-check-label ms-1" for="{{ filter.form.self_tasks.id_for_label }}">
          Только свои задачи
        </label>
      </div>

      <button class="btn btn-primary">Показать</button>
    </form>

  </div>
</div>
