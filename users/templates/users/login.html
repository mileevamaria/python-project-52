{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
  <h1 class="display-5 mb-4">{% block title %}Вход{% endblock %}</h1>

  <form method="post">
    {% csrf_token %}

    {% include "includes/form_field.html" with field=form.username type="input" %}
    {% include "includes/form_field.html" with field=form.password type="password" %}

    <button type="submit" class="btn btn-primary">
      Войти
    </button>
  </form>
</div>
{% endblock %}
